version: 1

agent:
  type: cli
  command: node ./agent.js
  timeout_ms: 30000

evals:
  - name: accuracy
    type: golden_dataset
    dataset: ./evals/accuracy.jsonl
    scorer: semantic_similarity
    threshold: 0.85

  - name: edge_cases
    type: golden_dataset
    dataset: ./evals/edge_cases.jsonl
    scorer: contains
    threshold: 1

  - name: tool_use
    type: golden_dataset
    dataset: ./evals/tool_use.jsonl
    scorer: contains
    threshold: 1

  - name: hallucination
    type: golden_dataset
    dataset: ./evals/hallucination.jsonl
    scorer: contains
    threshold: 1

  - name: out_of_scope
    type: golden_dataset
    dataset: ./evals/out_of_scope.jsonl
    scorer: contains
    threshold: 1

ci:
  block_on_regression: true
  regression_threshold: 0.05
  compare_to: main
  post_comment: true
  fail_on_new_suite: false
